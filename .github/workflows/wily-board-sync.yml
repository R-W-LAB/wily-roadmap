name: Notify Wily Board

on:
  push:
    paths: ['.wily/**']
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Wily Board
        shell: bash
        env:
          WILY_BOARD_URL: ${{ secrets.WILY_BOARD_URL }}
          WILY_BOARD_SECRET: ${{ secrets.WILY_BOARD_SECRET }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
        run: |
          payload="{\"repo\":\"$REPO\",\"sha\":\"$SHA\",\"ref\":\"$REF\"}"
          signature="$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WILY_BOARD_SECRET" | awk '{print $2}')"
          curl -fsS -X POST "$WILY_BOARD_URL/webhooks/github" \
            -H "X-Wily-Signature: sha256=$signature" \
            -H "Content-Type: application/json" \
            -d "$payload"
